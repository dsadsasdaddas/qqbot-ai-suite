services:
  dora-vertex-proxy:
    image: docker.m.daocloud.io/library/node:25-alpine
    container_name: dora-vertex-proxy
    restart: unless-stopped
    network_mode: host
    working_dir: /app
    command: ["node", "scripts/google-vertex-image-proxy.mjs"]
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-service-account.json
    volumes:
      - ./services/dora-vertex-proxy:/app:ro
      - ./secrets/gcp-service-account.json:/secrets/gcp-service-account.json:ro

  astrbot:
    image: soulter/astrbot:latest
    container_name: astrbot
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6185:6185"
      - "127.0.0.1:6199:6199"
    volumes:
      - ./data:/AstrBot/data
    networks:
      - astrbot_network

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    environment:
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - MODE=astrbot
      - TZ=Asia/Shanghai
    ports:
      - "6099:6099"
    volumes:
      - ./data:/AstrBot/data
      - ./napcat/config:/app/napcat/config
      - ./ntqq:/app/.config/QQ
    depends_on:
      - astrbot
    networks:
      - astrbot_network

  glm-code-runner:
    image: soulter/astrbot:latest
    container_name: glm-code-runner
    restart: unless-stopped
    command: ["python3", "/app/server.py"]
    environment:
      - BIND_HOST=0.0.0.0
      - PORT=8879
      - TOKEN_FILE=/secrets/glm_code_runner.token
      - SANDBOX_IMAGE=soulter/astrbot:latest
      - MAX_CONCURRENCY=2
      - DEFAULT_TIMEOUT=8
      - MAX_TIMEOUT=15
      - SANDBOX_MEMORY=256m
      - SANDBOX_CPUS=0.5
    volumes:
      - ./services/glm-code-runner/server.py:/app/server.py:ro
      - ./secrets/glm_code_runner.token:/secrets/glm_code_runner.token:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    networks:
      - astrbot_network

  # Build-only service for the sandboxed Dora SSR runtime image.
  # Build with: docker compose --profile dora-build build dora-runtime-image
  dora-runtime-image:
    build:
      context: ./services/dora-runtime
    image: qqbot/dora-runtime:latest
    profiles:
      - dora-build
    command: ["true"]

  dora-game-gateway:
    build:
      context: ./services/dora-game-gateway
    image: qqbot/dora-game-gateway:latest
    container_name: dora-game-gateway
    restart: unless-stopped
    environment:
      - BIND_HOST=0.0.0.0
      - PORT=8890
      - PUBLIC_BASE_URL=http://127.0.0.1:8890
      - DORA_GATEWAY_TOKEN_FILE=/run/secrets/dora_game_gateway_token
      - DORA_RUNTIME_IMAGE=qqbot/dora-runtime:latest
      - DORA_DOCKER_NETWORK=qqbot_dora_games
      - HOST_PROJECTS_DIR=/home/wzu/qqbot/dora/projects
      - SESSIONS_DIR=/data
      - DEFAULT_TTL_SECONDS=1800
      - RUNTIME_MEMORY=768m
      - RUNTIME_CPUS=1.0
    ports:
      - "127.0.0.1:8890:8890"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - ./dora/projects:/home/wzu/qqbot/dora/projects
      - ./dora/sessions:/data
      - ./data/secrets/dora_game_gateway.token:/run/secrets/dora_game_gateway_token:ro
    networks:
      - astrbot_network
      - dora_games
    profiles:
      - dora

  # Optional local LLM. Pull your model manually and configure AstrBot provider:
  # api_base: http://ollama-gemma4:11435/v1
  ollama-gemma4:
    image: ollama/ollama:latest
    container_name: ollama-gemma4
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11435
      - OLLAMA_MODELS=/models
      - OLLAMA_ORIGINS=*
    volumes:
      - ./ollama-models:/models
    networks:
      - astrbot_network
    profiles:
      - ollama

networks:
  astrbot_network:
    driver: bridge
  dora_games:
    name: qqbot_dora_games
    driver: bridge
    internal: true
